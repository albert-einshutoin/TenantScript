name: Tier 2 Live

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-smoke-placeholder:
    name: live Cloudflare smoke placeholder
    runs-on: ubuntu-latest
    if: github.repository_owner == 'albert-einshutoin'
    steps:
      - run: |
          echo "Tier 2 is reserved for Cloudflare-backed smoke and latency benchmarks."
          echo "Keep all fork-safe checks in Tier 1."

  approval-workflow-contract:
    name: approval workflow contract
    runs-on: ubuntu-latest
    if: github.repository_owner == 'albert-einshutoin'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tenantscript/capabilities test -- test/approval-lifecycle.test.ts
