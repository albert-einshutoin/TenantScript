name: Tier 2 Live

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-runtime-benchmark:
    name: live Cloudflare runtime benchmark
    runs-on: ubuntu-latest
    if: >-
      github.repository_owner == 'albert-einshutoin' &&
      github.ref == 'refs/heads/main' &&
      vars.TIER2_LIVE_ENABLED == 'true'
    environment: cloudflare-live
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate fixed public benchmark origin
        env:
          TIER2_RUNTIME_BENCH_URL: ${{ vars.TIER2_RUNTIME_BENCH_URL }}
        run: node scripts/runtime-benchmark-live.mjs check-url --base-url "$TIER2_RUNTIME_BENCH_URL"
      - name: Deploy reviewed runtime benchmark
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @tenantscript/runtime-bench run deploy
      - id: runtime-benchmark
        name: Measure fixed warm and cold scenarios
        env:
          TIER2_RUNTIME_BENCH_URL: ${{ vars.TIER2_RUNTIME_BENCH_URL }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: >-
          node scripts/runtime-benchmark-live.mjs run
          --base-url "$TIER2_RUNTIME_BENCH_URL"
          --source-revision "$GITHUB_SHA"
      - uses: actions/upload-artifact@v6
        if: always() && steps.runtime-benchmark.outcome != 'skipped'
        with:
          name: runtime-benchmark-evidence-${{ github.sha }}
          path: .tmp/tier2/runtime-benchmark-evidence.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30

  approval-workflow-contract:
    name: approval workflow contract
    runs-on: ubuntu-latest
    if: github.repository_owner == 'albert-einshutoin'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tenantscript/capabilities test -- test/approval-lifecycle.test.ts

  chaos-contract:
    name: accountless chaos scenarios
    runs-on: ubuntu-latest
    if: github.repository_owner == 'albert-einshutoin'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:chaos
