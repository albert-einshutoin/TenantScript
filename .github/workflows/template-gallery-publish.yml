name: Publish Template Gallery

on:
  workflow_dispatch:
    inputs:
      source_revision:
        description: Full main commit SHA to deploy
        required: true
        type: string
      confirm_production_deploy:
        description: Confirm production deployment
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: template-gallery-production
  cancel-in-progress: false

jobs:
  publish:
    name: publish reviewed static gallery
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.repository_owner == 'albert-einshutoin' &&
      github.ref == 'refs/heads/main' &&
      inputs.confirm_production_deploy
    environment: template-gallery-production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_revision }}
      - name: Verify immutable main revision
        env:
          EXPECTED_SOURCE_REVISION: ${{ inputs.source_revision }}
        run: |
          if [[ ! "$EXPECTED_SOURCE_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$EXPECTED_SOURCE_REVISION"
          git merge-base --is-ancestor "$EXPECTED_SOURCE_REVISION" origin/main
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tenantscript/template-gallery test
      - run: pnpm --filter @tenantscript/template-gallery build
      - name: Validate Workers Assets deployment
        env:
          WRANGLER_SEND_METRICS: "false"
        run: >-
          pnpm exec wrangler deploy
          --dry-run
          --config apps/template-gallery/wrangler.jsonc
          --outdir .tmp/template-gallery-assets
          --strict
          --autoconfig=false
          --install-skills=false
      - name: Deploy static gallery
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: "false"
        run: >-
          pnpm exec wrangler deploy
          --config apps/template-gallery/wrangler.jsonc
          --strict
          --autoconfig=false
          --install-skills=false
