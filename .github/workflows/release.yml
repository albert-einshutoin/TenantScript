name: Publish Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: publish npm packages and GitHub Release
    if: >-
      github.repository_owner == 'albert-einshutoin' &&
      vars.NPM_TRUSTED_PUBLISHING_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - name: Verify tag is on main
        run: |
          git fetch origin main --no-tags
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Validate release candidate
        run: node scripts/release-preflight.mjs "$GITHUB_REF_NAME"
      - run: pnpm verify
      - run: pnpm pack:check
      - run: pnpm sbom:generate
      # npm CLI obtains a short-lived credential from GitHub OIDC; long-lived registry tokens stay absent.
      - name: Publish packages with npm trusted publishing
        run: pnpm changeset publish
      - name: Push package tags
        run: git push origin --tags
      - name: Create GitHub Release with verified SBOM
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          .tmp/release-artifacts/tenantscript.cdx.json
          --verify-tag
          --generate-notes
          --title "TenantScript $GITHUB_REF_NAME"
