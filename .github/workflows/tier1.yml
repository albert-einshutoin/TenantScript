name: Tier 1

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  accountless:
    name: accountless quality gate
    runs-on: ubuntu-latest
    steps:
      # Review campaigns are pinned to historical commits and validate paths in that exact tree.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Playwright binaries are not part of the pnpm store on a fresh hosted runner.
      - run: pnpm --filter @tenantscript/admin-ui exec playwright install --with-deps chromium
      - run: pnpm typecheck
      - run: pnpm lint:boundaries
      - run: pnpm lint
      - run: pnpm test:plugin-reviews
      - run: pnpm test:api-surface
      - run: pnpm test:release-policy
      - run: pnpm test:release-automation
      - run: pnpm test:agent-scaffold
      - run: pnpm test:agent-evals
      - run: pnpm test:judge-image
      - run: pnpm test:template-submissions
      - run: pnpm test:template-catalog
      - id: template-gallery
        run: pnpm test:template-gallery
      - uses: actions/upload-artifact@v4
        if: failure() && steps.template-gallery.outcome == 'failure'
        with:
          name: template-gallery-failure-${{ github.sha }}
          path: |
            apps/template-gallery/test-results
            apps/template-gallery/playwright-report
          if-no-files-found: error
          retention-days: 14
      - run: pnpm test:admin-ui-accessibility
      - id: admin-ui-visual
        run: pnpm test:admin-ui-visual
      - uses: actions/upload-artifact@v4
        if: failure() && steps.admin-ui-visual.outcome == 'failure'
        with:
          name: admin-ui-visual-failure-${{ github.sha }}
          path: |
            apps/admin-ui/test-results
            apps/admin-ui/playwright-report
          if-no-files-found: error
          retention-days: 14
      - run: pnpm test:admin-ui-performance
      - run: pnpm test:admin-ui-bundle-budget
      - run: pnpm test:packages
      - run: pnpm test:sbom
      - run: pnpm sbom:generate
      - uses: actions/upload-artifact@v4
        with:
          name: tenantscript-sbom-${{ github.sha }}
          path: .tmp/release-artifacts/tenantscript.cdx.json
          if-no-files-found: error
          retention-days: 14
      - run: pnpm test:coverage
      - run: pnpm test:security
      # npm retired the audit endpoint used by pnpm 10, so scan the committed lockfile directly.
      # Pinning OSV-Scanner keeps this accountless and reproducible for fork pull requests.
      - uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
      - run: pnpm format
