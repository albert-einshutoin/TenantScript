name: Tier 1

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  accountless:
    name: accountless quality gate
    runs-on: ubuntu-latest
    steps:
      # Review campaigns are pinned to historical commits and validate paths in that exact tree.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint:boundaries
      - run: pnpm lint
      - run: pnpm test:api-surface
      - run: pnpm test:release-policy
      - run: pnpm test:release-automation
      - run: pnpm test:agent-scaffold
      - run: pnpm test:admin-ui-bundle-budget
      - run: pnpm test:packages
      - run: pnpm test:sbom
      - run: pnpm sbom:generate
      - uses: actions/upload-artifact@v4
        with:
          name: tenantscript-sbom-${{ github.sha }}
          path: .tmp/release-artifacts/tenantscript.cdx.json
          if-no-files-found: error
          retention-days: 14
      - run: pnpm test:coverage
      - run: pnpm test:security
      # npm retired the audit endpoint used by pnpm 10, so scan the committed lockfile directly.
      # Pinning OSV-Scanner keeps this accountless and reproducible for fork pull requests.
      - uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
      - run: pnpm format
